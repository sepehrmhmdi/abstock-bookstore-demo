<div class="card" id="shipping-card">
  <div class="label">Choisir un mode de livraison</div>
  <div id="shipping-offers" class="radio-row" aria-live="polite">
    <div class="help" id="shipping-loading">Recherche des offres…</div>
  </div>

  <div class="totals" style="margin-top:.6rem">
    <div class="row" style="display:flex;justify-content:space-between;margin:.25rem 0">
      <span>Sous-total articles</span>
      <span id="subtotal-text">{{ cards_total|price }}</span>
    </div>
    <div class="row" style="display:flex;justify-content:space-between;margin:.25rem 0">
      <span>Frais de livraison</span>
      <span id="shipping-text">{% if shipping_price %}{{ shipping_price|price }}{% else %}—{% endif %}</span>
    </div>
    <div class="row total" style="display:flex;justify-content:space-between;margin:.25rem 0;font-weight:700;border-top:1px dashed #ddd;padding-top:.35rem">
      <span>Total</span>
      <span id="grand-text">{% if grand_total %}{{ grand_total|price }}{% else %}{{ cards_total|price }}{% endif %}</span>
    </div>
  </div>
</div>

<script>
(function(){
  // ----- helpers prix -----
  function cents(n){ n = Number(n||0); return Math.max(0, Math.round(n)); }
  function currency(){ return (document.getElementById('js-currency')||{}).value || '€'; }
  function fmt(c){ c=cents(c); var s=(c/100).toFixed(2).replace('.', ','); return s+' '+currency(); }

  // ----- données page (venues du serveur) -----
  var ids  = "{{ ids|default:'' }}";
  var L1   = "{{ l1|default:'' }}";
  var L2   = "{{ l2|default:'' }}";
  var VIL  = "{{ ville|default:'' }}";
  var CP   = "{{ cp|default:'' }}";
  var PAY  = "{{ pays|default:'' }}";
  var pre  = "{{ shipping_id|default:'' }}";

  // ----- elements DOM partagés avec la page -----
  var subtotalCents = cents((document.getElementById('js-subtotal')||{}).value||0);
  var shipServer    = cents((document.getElementById('js-server-ship')||{}).value||0);
  var hiddenId      = document.getElementById('shipping_id');
  var hiddenShip    = document.getElementById('ship'); // compat
  var shipText      = document.getElementById('shipping-text');
  var grandText     = document.getElementById('grand-text');
  var subtotalText  = document.getElementById('subtotal-text');
  if (subtotalText) subtotalText.textContent = fmt(subtotalCents);

  function setShip(c){
    if (shipText)  shipText.textContent  = c ? fmt(c) : '—';
    if (grandText) grandText.textContent = fmt(subtotalCents + cents(c));
  }

  // ----- rendu offres -----
  var box = document.getElementById('shipping-offers');
  var loading = document.getElementById('shipping-loading');

  function render(list){
    if (!box) return;
    box.innerHTML = '';
    if (!list || !list.length){
      var d = document.createElement('div');
      d.className = 'help';
      d.textContent = 'Aucune offre de livraison trouvée pour cette adresse.';
      box.appendChild(d);
      setShip(0);
      if (hiddenId) hiddenId.value = '';
      if (hiddenShip) hiddenShip.value = '';
      return;
    }

    list.sort(function(a,b){ return (a.price||0) - (b.price||0); });

    list.forEach(function(o, idx){
      var id = o.id, label = o.label || (o.provider||'Colissimo'), eta = o.eta || '', price = cents(o.price||0);
      var lab = document.createElement('label');
      lab.className = 'radio-pill';
      lab.innerHTML =
        '<input type="radio" name="shipping_choice" value="'+id+'">' +
        '<span>'+label+(eta? ' — '+eta : '')+'</span>' +
        '<span style="margin-left:.4rem;opacity:.8">('+fmt(price)+')</span>';

      var input = lab.querySelector('input');
      input.addEventListener('change', function(){
        if (hiddenId)  hiddenId.value  = id;
        if (hiddenShip) hiddenShip.value = id; // compat
        setShip(price);
      });

      // pré-sélection
      if ((pre && pre === id) || (!pre && idx===0)){
        input.checked = true;
        if (hiddenId)  hiddenId.value  = id;
        if (hiddenShip) hiddenShip.value = id;
        setShip(price);
      }

      box.appendChild(lab);
    });

    // si retour arrière avec port déjà calculé
    if (shipServer && !pre){ setShip(shipServer); }
  }

  // ----- fetch API -----
  function qs(o){ return Object.keys(o).map(function(k){ var v=o[k]; if(v==null) return null; return encodeURIComponent(k)+'='+encodeURIComponent(String(v)); }).filter(Boolean).join('&'); }
  var url = '/api/shipping/rates?' + qs({ids:ids,l1:L1,l2:L2,ville:VIL,cp:CP,pays:PAY});
  fetch(url, {credentials:'same-origin'})
    .then(function(r){ return r.ok ? r.json() : []; })
    .then(function(arr){ if (loading) loading.remove(); render(arr); })
    .catch(function(){ if (loading) loading.textContent='Impossible de récupérer les offres pour le moment.'; });
})();
</script>
