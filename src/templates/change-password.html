{% extends "base.html" %}

{% block title %}Changer mon mot de passe{% endblock %}

{% block content %}
<section class="section client-space-wrapper">
  <div class="client-card box">
    <h1 class="title is-3 has-text-centered">Changer mon mot de passe</h1>

    {% if error %}
      <div class="notification is-danger has-text-centered">
        {{ error }}
      </div>
    {% endif %}
    {% if success %}
      <div class="notification is-success has-text-centered">
        {{ success }}
      </div>
    {% endif %}

    <form action="/mon-compte/mot-de-passe" method="post" class="form">
      <div class="field">
        <label class="label">Mot de passe actuel</label>
        <div class="control">
          <input class="input" type="password" name="old_password" placeholder="Votre mot de passe actuel" required>
        </div>
      </div>

      <div class="field">
        <label class="label">Nouveau mot de passe</label>
        <div class="control">
          <input class="input" type="password" name="new_password" placeholder="Nouveau mot de passe" required>
        </div>
      </div>

      <div class="field">
        <label class="label">Confirmer le nouveau mot de passe</label>
        <div class="control">
          <input class="input" type="password" name="confirm_password" placeholder="Confirmer le nouveau mot de passe" required>
        </div>
      </div>

      <div class="field is-grouped is-grouped-centered mt-5">
        <div class="control">
          <button class="button is-link is-rounded" type="submit">
            <span class="icon"><i class="fas fa-key"></i></span>
            <span>Changer le mot de passe</span>
          </button>
        </div>
        <div class="control">
          <a href="/mon-compte" class="button is-light is-rounded">
            <span class="icon"><i class="fas fa-times"></i></span>
            <span>Annuler</span>
          </a>
        </div>
      </div>
    </form>
  </div>
</section>

<style>
  .client-space-wrapper {
    max-width: 720px;
    margin: 2.5rem auto;
  }
  .client-card {
    background-color: #fffade;
    border: 1px solid #d6c7b0;
    border-radius: 12px;
    padding: 2rem;
  }
  body.dark-mode .client-card {
    background-color: #4a3c33;
    color: #f5f5f5;
    border-color: #7c6357;
  }
</style>
{% endblock %}
