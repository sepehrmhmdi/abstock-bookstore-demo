<!-- ============ Colissimo – Widget Point Relais ============ -->
<div class="card" id="colissimo-widget" style="padding:.9rem">
  <style>
    #colissimo-widget .cw-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
    #colissimo-widget .label{font-weight:600}
    #colissimo-widget .cw-actions{font-size:.85rem;opacity:.8}
    #colissimo-widget .cw-actions a{color:#3f4c73;text-decoration:none;border-bottom:1px dotted #3f4c73}
    #colissimo-widget .cw-badge{display:none;margin:.4rem 0 .6rem;padding:.35rem .6rem;border:1px solid #e6ddc7;border-radius:999px;background:#fff}
    #colissimo-widget .cw-iframe{width:100%;height:560px;border:1px solid #eee;border-radius:10px;background:#fff}
    #colissimo-widget .cw-hint{font-size:.85rem;opacity:.75;margin-top:.5rem}
    #colissimo-widget .cw-warn{display:none;margin:.5rem 0 0;background:#fff7f7;border:1px solid #f3b5b5;border-radius:8px;padding:.5rem .7rem;font-size:.9rem}
  </style>

  <div class="cw-head">
    <div class="label">Point de retrait</div>
    <div class="cw-actions"><a href="#" id="cw-reload">Recharger</a></div>
  </div>

  <div id="cw-selected" class="cw-badge"></div>
  <div id="cw-warn" class="cw-warn">Le widget Colissimo ne répond pas (port 3032). Vérifie qu’il est lancé.</div>

  <iframe
    id="colissimo-frame"
    class="cw-iframe"
    title="Recherche de points Colissimo"
    src="about:blank"
    loading="lazy"
    referrerpolicy="no-referrer"
  ></iframe>

  <div class="cw-hint">Choisissez un point. Il sera automatiquement remonté dans le formulaire.</div>
</div>

<script>
(function(){
  // éviter double montage si le template est inclus plusieurs fois
  if (window.__colissimo_widget_mounted) return;
  window.__colissimo_widget_mounted = true;

  var ROOT   = document.getElementById('colissimo-widget');
  var IFRAME = document.getElementById('colissimo-frame');
  var BADGE  = document.getElementById('cw-selected');
  var WARN   = document.getElementById('cw-warn');

  // champs cachés dans la page parente
  var pickupId    = document.getElementById('pickup_id');
  var pickupLabel = document.getElementById('pickup_label');

  // radio adresses existantes
  function selectedExisting(){ return document.querySelector('input[name="existing_adresse"]:checked'); }

  // lire l'adresse courante (radio cochée ou champs libres)
  function readAddr(){
    var r = selectedExisting();
    var l1   = r ? (r.dataset.l1   || '') : (document.getElementById('ligne1')?.value || '');
    var cp   = r ? (r.dataset.cp   || '') : (document.getElementById('code_postal')?.value || '');
    var ville= r ? (r.dataset.ville|| '') : (document.getElementById('ville')?.value || '');
    var pays = r ? (r.dataset.pays || 'FR') : (document.getElementById('pays')?.value || 'FR');
    return {address:l1, zipCode:cp, city:(ville||'').toUpperCase(), countryCode:(pays||'FR').toUpperCase()};
  }

  // construire l'URL de l'iframe pour le proxy (notre demo.html attend ces clés)
  function buildUrl(){
    var a = readAddr();
    var sp = new URLSearchParams({
      embed: '1',
      address: a.address || '',
      zipCode: a.zipCode || '',
      city: a.city || '',
      countryCode: a.countryCode || 'FR',
      weight: '1000'
    });
    return 'http://127.0.0.1:3032/map?' + sp.toString();
  }

  var lastSrc = '';
  var notRespondingTimer = null;

  function mount(){
    try{ BADGE.style.display = BADGE.textContent ? '' : 'none'; }catch(_){}
    var src = buildUrl();
    if (src === lastSrc) return;
    lastSrc = src;

    WARN.style.display = 'none';
    IFRAME.src = src;

    // si rien ne charge (proxy down), on affiche un avertissement
    clearTimeout(notRespondingTimer);
    notRespondingTimer = setTimeout(function(){
      // s'il n'a pas émis le load en 2.5s, on suppose down
      if (WARN) WARN.style.display = '';
    }, 2500);
  }

  IFRAME.addEventListener('load', function(){ clearTimeout(notRespondingTimer); WARN.style.display = 'none'; });

  // rechargement manuel
  document.getElementById('cw-reload').addEventListener('click', function(e){ e.preventDefault(); mount(); });

  // remonter quand l'adresse change
  ['input','change'].forEach(function(evt){
    document.addEventListener(evt, function(e){
      if (e.target.matches('#ligne1,#code_postal,#ville,#pays,[name="existing_adresse"]')) mount();
    });
  });

  var ALLOWED = new Set(['http://127.0.0.1:3032','http://localhost:3032']);

  window.addEventListener('message', function(ev){
    try{
      if (!ALLOWED.has(ev.origin)) return;

      var d = ev.data || {};

      // 1) format du demo.html fourni ici
      if (d.type === 'colissimo:pudo:selected'){
        applySelection(d.id || d.code || '', d.label || d.name || '');
        return;
      }
      // 2) format alternatif (certaines implémentations perso)
      if (d.source === 'colissimo-widget' && d.type === 'pickup-selected'){
        applySelection(d.id || d.code || '', d.label || d.name || '');
        return;
      }
    }catch(_){}
  }, false);

  function applySelection(id, label){
    if (pickupId)    pickupId.value = id || '';
    if (pickupLabel) pickupLabel.value = label || '';

    if (BADGE){
      BADGE.textContent = (id ? (id + ' — ') : '') + (label || '');
      BADGE.style.display = BADGE.textContent ? '' : 'none';
    }
    var err = document.getElementById('ship-error');
    if (err) err.style.display = 'none';

    var submit = document.querySelector('form button[type="submit"]');
    if (submit) submit.scrollIntoView({behavior:'smooth', block:'center'});
  }

  // premier montage
  mount();
})();
</script>
<!-- ========== /Colissimo – Widget Point Relais ========== -->
