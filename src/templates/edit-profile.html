{% extends "base.html" %}

{% block title %}Modifier mes informations{% endblock %}

{% block content %}
<section class="section client-space-wrapper">
  <div class="client-card box">
    <h1 class="title is-3 has-text-centered">Modifier mes informations</h1>

    {% if error %}
      <div class="notification is-danger is-light">{{ error }}</div>
    {% endif %}

    <form action="/mon-compte/editer" method="post" class="form">
      <div class="field">
        <label class="label">Prénom</label>
        <div class="control">
          <input class="input" type="text" name="prenom" value="{{ prenom }}" required>
        </div>
      </div>

      <div class="field">
        <label class="label">Nom</label>
        <div class="control">
          <input class="input" type="text" name="nom" value="{{ nom }}" required>
        </div>
      </div>

      <div class="field">
        <label class="label">Email</label>
        <div class="control">
          <input class="input" type="email" name="email" value="{{ email }}" required>
        </div>
      </div>

      <div class="field">
        <label class="label">Téléphone</label>
        <div class="control">
          <input class="input" type="tel" name="telephone" value="{{ telephone }}">
        </div>
      </div>

      <p class="is-size-7 has-text-grey mt-3">
        La gestion des adresses se fait depuis <a href="/mon-compte">« Mon compte »</a>.
      </p>

      <div class="field is-grouped is-grouped-centered mt-5">
        <div class="control">
          <button class="button is-link is-rounded" type="submit">
            <span class="icon"><i class="fas fa-save"></i></span>
            <span>Enregistrer</span>
          </button>
        </div>
        <div class="control">
          <a href="/mon-compte" class="button is-light is-rounded">
            <span class="icon"><i class="fas fa-times"></i></span>
            <span>Annuler</span>
          </a>
        </div>
      </div>
    </form>
  </div>
</section>

<style>
  .client-space-wrapper {
    max-width: 720px;
    margin: 2.5rem auto;
  }
  .client-card {
    background-color: #fffade;
    border: 1px solid #d6c7b0;
    border-radius: 12px;
    padding: 2rem;
  }
  body.dark-mode .client-card {
    background-color: #4a3c33;
    color: #f5f5f5;
    border-color: #7c6357;
  }
</style>
{% endblock %}
