<div class="column is-4-desktop is-6-tablet is-full-mobile">
  <div class="card livre-row" id="{{ card.id }}">

    <!-- Image -->
    <div class="card-image">
      <a href="{{ card | url }}">
        <figure class="image is-3by4">
          {% if card.cover %}
            <img src="{{ card.cover }}" alt="Couverture de {{ card.title }}" class="book-cover" />
          {% else %}
            <img src="/static/img/no_cover.svg" alt="Pas de couverture" class="book-cover" />
          {% endif %}
        </figure>
      </a>
    </div>

    <!-- Contenu -->
    <div class="card-content py-3 px-3">
      <p class="title is-6 mb-1" title="{{ card.title }}">
        <a href="{{ card | url }}" class="has-text-dark">{{ card.title }}</a>
      </p>

      {% if card.author %}
        <p class="is-size-7 mb-1">
          <a href="/search?q={{ card.author }}">{{ card.author | capfirst }}</a>
        </p>
      {% endif %}

      {% if card.publisher %}
        <p class="is-size-7 has-text-grey">{{ card.publisher | capfirst }}</p>
      {% endif %}

      {% if card.shelf %}
        <p class="mt-2">
          <a href="/search?rayon={{ card.shelf_id }}">
            <span class="tag is-light is-small" title="{{ card.shelf }}">
              {{ card.shelf | truncatechars:27 }}
            </span>
          </a>
        </p>
      {% endif %}

      {% if card.price %}
        <p class="has-text-weight-semibold is-size-6 mt-2">{{ card.price | price }}</p>
      {% endif %}

      <div class="has-text-right mt-3">
        <span class="icon is-medium has-tooltip-left" data-tooltip="Ajouter au panier" style="cursor: pointer;" onclick="add_to_cart({{ card.id }})">
          <i class="fas fa-plus-circle has-text-purple"></i>
        </span>
      </div>
    </div>
  </div>
</div>
